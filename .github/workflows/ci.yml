name: CI

# Continuous integration (Future_Work §8.5). Runs the same gates the local
# Husky/lint-staged hooks enforce — lint, type-check, tests, build — plus a
# migration validation, on every push to the main branches and on every PR.
# Standard Linux runners only (free + unlimited on public repos; on the Free
# plan private repos still bill Linux at 1×, so we never use Windows/macOS).

on:
  push:
    branches: [main, develop]
  pull_request:

# A newer push to the same ref cancels the older, still-running pipeline.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend (lint, build, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: i18n key parity (en/el/de)
        run: npm run i18n:check
      # `npm run build` runs `tsc -b` (the real type-check) + the Vite build,
      # so it covers type-checking and the production bundle in one step.
      - name: Type-check + build
        run: npm run build
      - name: Unit tests
        run: npm test

  backend:
    name: Backend (lint, type-check, test, migrations)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: zoe
          POSTGRES_PASSWORD: zoe
          POSTGRES_DB: zoe_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U zoe -d zoe_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Backend integration tests reset + seed this DB themselves (globalSetup).
      TEST_DATABASE_URL: postgresql://zoe:zoe@localhost:5432/zoe_test
      # Used by the migration-validation step below (and harmless to the tests).
      DATABASE_URL: postgresql://zoe:zoe@localhost:5432/zoe_test
      DIRECT_URL: postgresql://zoe:zoe@localhost:5432/zoe_test
      JWT_SECRET: ci-test-secret-min-32-chars-aaaaaaaaaa
      NODE_ENV: test
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Lint
        run: npm run lint
      - name: Type-check
        run: npm run type-check
      # Validate that the committed migrations apply cleanly from scratch AND
      # fully reproduce schema.prisma (no drift). `migrate deploy` is exactly the
      # command a production release runs (Future_Work §8.5).
      - name: Validate migrations (deploy + drift check)
        run: |
          npx prisma migrate deploy
          npx prisma migrate diff \
            --from-url "$DATABASE_URL" \
            --to-schema-datamodel prisma/schema.prisma \
            --exit-code
      - name: Integration tests
        run: npm test
