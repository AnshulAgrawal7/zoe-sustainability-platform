name: Lighthouse

# Performance/accessibility/SEO budget (Future_Work §11.4). PR-only and
# INFORMATIONAL: the budget thresholds are warnings (see lighthouserc.json), so
# this never blocks a merge — it surfaces the numbers and uploads the full
# report. Tighten the assertions to "error" once a stable CI baseline is known.

on:
  pull_request:

concurrency:
  group: lighthouse-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lighthouse:
    name: Lighthouse CI (landing page)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build frontend
        run: npm run build
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
